<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>La Recibida · 24 de Julio</title>
  <meta name="theme-color" content="#fff8f5">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="page">

    <header class="hero-text">
      <h1 class="title">
        <span class="t1">Ahora sí puedo decir</span>
        <span class="t2" id="t2hero">que es viral</span>
      </h1>
      <div class="event-meta" id="eventMeta">
        <p class="meta-line">Viernes, 24 de julio · 21PM</p>
        <p class="meta-line meta-place">Av. Juan Bautista Alberdi 2476 SUM</p>
      </div>
    </header>

    <div class="folder-wrap" id="folderWrap">
      <div class="folder-scene" id="folderScene">

        <div class="photo-stack" id="photoStack">

          <div class="photo-card" data-idx="0"><img src="assets/foto%20gi%203.png" alt="Gi" draggable="false"></div>
          <div class="photo-card" data-idx="1"><img src="assets/foto%20gi%202.png" alt="Gi" draggable="false"></div>
          <div class="photo-card" data-idx="2"><img src="assets/foto%20gi.png" alt="Gi" draggable="false"></div>
          <div class="photo-card" data-idx="3"><img src="assets/foto%20gi%204.png" alt="Gi" draggable="false"></div>

        </div>

        <div class="folder-back" id="folderBack">
          <div class="folder-tab"></div>
          <div class="folder-body"></div>
        </div>

        <div class="folder-front" id="folderFront">
          <div class="folder-front-inner">
            <div class="folder-shine"></div>
            <div class="folder-pill"><span>La Recibida.gallery</span></div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <div class="drag-hint" id="dragHint">arrastrá una foto hacia abajo para cerrar</div>

  <script src="script.js"></script>
</body>
</html>
