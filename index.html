<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>La Recibida · 24 de Julio</title>
  <meta name="theme-color" content="#fff8f5">

  <!-- Open Graph / WhatsApp preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Ahora sí puedo decir que es viral 🎉">
  <meta property="og:description" content="Viernes, 24 de julio · 21hs · Av. Juan Bautista Alberdi 2476 SUM">
  <meta property="og:image" content="https://solpaiva3.github.io/recibida-gi/assets/preview.png">
  <meta property="og:url" content="https://solpaiva3.github.io/recibida-gi/">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
/* ===== RESET & VARS ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:   #ff80a6;
  --accent:    #b33d5c;
  --bg:        #fff8f5;
  --ink:       #2a0e0e;
}

html, body { height: 100%; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--ink);
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(255,128,166,.10) 1.5px, transparent 1.5px);
  background-size: 30px 30px;
  pointer-events: none; z-index: 0;
}

/* ===== PAGE ===== */
.page {
  position: relative; z-index: 1;
  min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding:
    max(clamp(40px, 6vh, 72px), env(safe-area-inset-top))
    max(32px, env(safe-area-inset-right))
    max(clamp(32px, 4vh, 56px), env(safe-area-inset-bottom))
    max(32px, env(safe-area-inset-left));
  overflow: visible;
}

/* ===== HERO ===== */
.hero-text {
  flex-shrink: 0; text-align: center;
  display: flex; flex-direction: column;
  align-items: center; gap: 28px;
}
.title { display: flex; flex-direction: column; align-items: center; gap: 8px; }

.t1 {
  font-size: clamp(22px, 3.8vw, 38px); font-weight: 400;
  color: rgba(42,14,14,.45); letter-spacing: -.01em; line-height: 1.2;
  opacity: 0; transform: translateY(12px);
  transition: opacity .65s ease, transform .65s ease;
}
.t1.visible { opacity: 1; transform: translateY(0); }

.t2 {
  font-size: clamp(42px, 7.5vw, 72px); font-weight: 900;
  color: var(--primary); text-transform: uppercase;
  letter-spacing: .02em; line-height: 1; opacity: 0;
}
.t2.visible { animation: t2-stamp .6s cubic-bezier(.22,1,.36,1) forwards; }

@keyframes t2-stamp {
  0%   { opacity:0; transform:scale(1.14); filter:blur(6px); }
  48%  { opacity:1; transform:scale(.97);  filter:blur(0); }
  72%  { transform:scale(1.015); }
  100% { opacity:1; transform:scale(1); }
}

.event-meta {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  opacity: 0; transform: translateY(10px);
  transition: opacity .6s ease, transform .6s ease;
}
.event-meta.visible { opacity: 1; transform: translateY(0); }

.meta-line {
  font-size: clamp(10px, 1.1vw, 12px); font-weight: 400;
  letter-spacing: .18em; text-transform: uppercase;
  color: rgba(179,61,92,.55);
}
.meta-line.meta-place { color: rgba(179,61,92,.35); }

/* ===== FOLDER WRAP ===== */
.folder-wrap {
  flex-shrink: 0; position: relative; overflow: visible;
  opacity: 0; margin-top: clamp(168px, 23vh, 216px);
}
.folder-wrap.drop-in { animation: folder-drop .9s cubic-bezier(.22,1,.36,1) forwards; }

@keyframes folder-drop {
  0%   { opacity:0; transform:translateY(-26px); }
  52%  { opacity:1; transform:translateY(4px); }
  76%  { transform:translateY(-2px); }
  100% { opacity:1; transform:translateY(0); }
}

.folder-scene {
  position: relative; width: 324px; height: 185px; overflow: visible;
}

.photo-stack { position: absolute; bottom: 46px; left: 50%; width: 0; height: 0; }

/* ===== PHOTO CARD (desktop fan) ===== */
.photo-card {
  position: absolute; bottom: 0; left: -94px;
  width: 188px; height: 242px; border-radius: 0; overflow: hidden;
  box-shadow: 0 6px 20px rgba(179,61,92,.14), 0 2px 6px rgba(179,61,92,.08);
  transform-origin: bottom center;
  transition: transform .5s cubic-bezier(.34,1.56,.64,1);
  will-change: transform; user-select: none; -webkit-user-select: none;
  touch-action: none; cursor: default;
}
.photo-card.dragging   { transition: none !important; }
.photo-card.open-state { cursor: grab; }
.photo-card.open-state:active { cursor: grabbing; }
.photo-card img {
  width:100%; height:100%; object-fit:cover; display:block;
  pointer-events:none; user-select:none; -webkit-user-drag:none;
}

/* ===== FOLDER STRUCTURE ===== */
.folder-back {
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 260px; height: 182px; pointer-events: none;
  transition: opacity .4s ease, transform .4s ease;
}
.folder-back.hidden { opacity:0; transform:translateX(-50%) scale(.92); }

.folder-tab {
  position: absolute; top:0; left:0; width:100px; height:32px;
  background: repeating-conic-gradient(#ff80a6 0% 25%, #fff 0% 50%) 0 0/28px 28px;
  border-radius: 9px 9px 0 0; border: 1px solid rgba(179,61,92,.15); border-bottom:none;
}
.folder-body {
  position: absolute; top:25px; left:0; right:0; bottom:0;
  background: repeating-conic-gradient(#ff80a6 0% 25%, #fff 0% 50%) 0 0/28px 28px;
  border-radius: 0 10px 10px 10px; border: 1px solid rgba(179,61,92,.15);
  box-shadow: inset 0 2px 0 rgba(255,255,255,.40), 0 18px 56px rgba(255,128,166,.35);
}
.folder-front {
  position: absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:278px; height:144px; cursor:pointer; z-index:20;
  transform-origin: bottom center;
  filter: drop-shadow(0 -8px 22px rgba(255,128,166,.40)) drop-shadow(0 5px 16px rgba(179,61,92,.14));
  transition: transform .45s ease, opacity .4s ease, filter .4s ease;
  -webkit-tap-highlight-color: transparent;
}
@media (hover:hover) and (pointer:fine) {
  .folder-front.hovered {
    transform: translateX(-50%) perspective(900px) rotateX(-26deg) translateY(11px);
    filter: drop-shadow(0 -18px 42px rgba(255,128,166,.55)) drop-shadow(0 8px 22px rgba(179,61,92,.22));
  }
}
@media (hover:none) and (pointer:coarse) {
  .folder-front:active .folder-front-inner { transform:scale(.97); opacity:.88; transition:transform .1s,opacity .1s; }
}
.folder-front.is-open { opacity:0; pointer-events:none !important; transform:translateX(-50%) scale(.88); }

.folder-front-inner {
  width:100%; height:100%;
  background: repeating-conic-gradient(#ffaac5 0% 25%, #fff8f5 0% 50%) 0 0/28px 28px;
  border-radius:14px; border:1.5px solid rgba(255,255,255,.60);
  box-shadow: inset 0 2px 0 rgba(255,255,255,.60), inset 0 -3px 12px rgba(179,61,92,.06);
  position:relative; overflow:hidden;
  display:flex; align-items:flex-end; justify-content:center; padding-bottom:22px;
}
.folder-shine {
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(to right,transparent,rgba(255,255,255,.75),transparent);
}
.folder-pill {
  padding:7px 16px; background:rgba(255,255,255,.65);
  border-radius:7px; border:1px solid rgba(255,255,255,.80); backdrop-filter:blur(8px);
}
.folder-pill span { color:var(--accent); font-size:11px; font-weight:600; letter-spacing:.07em; white-space:nowrap; }

/* Desktop drag-to-close hint */
.drag-hint {
  position:fixed; bottom:max(28px,env(safe-area-inset-bottom)); left:50%;
  transform:translateX(-50%) translateY(10px); z-index:300;
  padding:9px 20px; border-radius:50px;
  background:rgba(255,128,166,.10); border:1px solid rgba(255,128,166,.25);
  backdrop-filter:blur(8px); color:rgba(179,61,92,.50);
  font-size:10px; font-weight:500; letter-spacing:.13em;
  text-transform:uppercase; white-space:nowrap;
  opacity:0; transition:opacity .45s ease, transform .45s ease; pointer-events:none;
}
.drag-hint.visible { opacity:1; transform:translateX(-50%) translateY(0); }

/* ================================================================
   MOBILE — separate gallery overlay
   ================================================================ */

/* On mobile, folder stays smaller */
@media (max-width:600px) {
  .photo-stack  { bottom:40px; }
  .folder-scene { width:270px; height:154px; }
  .folder-back  { width:220px; height:154px; }
  .folder-tab   { width:86px; height:28px; }
  .folder-body  { top:21px; }
  .folder-front { width:236px; height:120px; border-radius:10px; }
  .folder-front-inner { border-radius:10px; padding-bottom:18px; }
  .folder-pill span { font-size:10px; }
  /* MORE BREATHING ROOM between text and folder */
  .folder-wrap  { margin-top: clamp(180px, 26vh, 220px); }
  .hero-text    { gap: 32px; }
  .title        { gap: 10px; }
  .meta-line    { font-size:11px; letter-spacing:.14em; }
}

/* ── Gallery overlay ── */
.gal {
  position: fixed; inset: 0; z-index: 600;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
  background: rgba(255,244,248,0.97);
  backdrop-filter: blur(28px) saturate(1.5);
  -webkit-backdrop-filter: blur(28px) saturate(1.5);
  /* enter state */
  opacity: 0;
  transform: translateY(18px);
  pointer-events: none;
  transition: opacity .32s ease, transform .38s cubic-bezier(.22,1,.36,1);
  overscroll-behavior: none;
  touch-action: none;
  padding-top: max(60px, env(safe-area-inset-top) + 16px);
  padding-bottom: max(40px, env(safe-area-inset-bottom) + 16px);
}
.gal.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

/* Close × */
.gal-close {
  position: absolute;
  top: max(18px, env(safe-area-inset-top) + 8px);
  right: 20px;
  width: 40px; height: 40px;
  border: 1.5px solid rgba(255,128,166,.40);
  background: rgba(255,255,255,.70);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; line-height: 1;
  color: rgba(179,61,92,.65);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  font-family: system-ui;
  z-index: 10;
  transition: background .15s, transform .15s;
}
.gal-close:active { background:rgba(255,128,166,.15); transform:scale(.9); }

/* Viewport + track */
.gal-viewport {
  width: 100%;
  overflow: hidden;
  flex-shrink: 0;
}
.gal-track {
  display: flex;
  will-change: transform;
  /* transition set by JS */
}
.gal-slide {
  flex: 0 0 100%;
  width: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 0 max(24px, env(safe-area-inset-left));
}
.gal-slide img {
  display: block;
  max-width: 84vw;
  max-height: 65vh;
  width: auto; height: auto;
  object-fit: contain;
  border-radius: 0;
  box-shadow: 0 24px 64px rgba(179,61,92,.22), 0 8px 24px rgba(0,0,0,.09);
  user-select: none; -webkit-user-drag: none;
  pointer-events: none;
}

/* Dots */
.gal-dots {
  display: flex; gap: 9px; align-items: center; flex-shrink: 0;
}
.gal-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,128,166,.30);
  transition: background .25s, transform .25s;
}
.gal-dot.active { background: var(--primary); transform: scale(1.55); }

/* Swipe hint */
.gal-hint {
  font-size: 10px; font-weight: 500;
  letter-spacing: .12em; text-transform: uppercase;
  color: rgba(179,61,92,.35);
  flex-shrink: 0;
}

/* ── Mobile idle animations ── */
@media (max-width:600px) {
  /* Folder gently floats up and down */
  @keyframes folder-idle {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-7px); }
  }
  .folder-wrap.idle {
    opacity: 1;
    animation: folder-idle 3.6s ease-in-out infinite;
  }

  /* Front flap pulses its glow */
  @keyframes glow-pulse {
    0%, 100% {
      filter: drop-shadow(0 -8px 22px rgba(255,128,166,.38))
              drop-shadow(0 5px 16px rgba(179,61,92,.12));
    }
    50% {
      filter: drop-shadow(0 -20px 40px rgba(255,128,166,.70))
              drop-shadow(0 8px 22px rgba(179,61,92,.24));
    }
  }
  .folder-front.glow:not(.is-open) {
    animation: glow-pulse 3.6s ease-in-out infinite;
  }
}

/* ── Landscape phones ── */
@media (max-height:600px) {
  .page { padding-top:16px; padding-bottom:12px; }
  .hero-text { gap:14px; }
  .folder-wrap { margin-top:36px; }
  .t2 { font-size:clamp(28px,7vw,48px); }
  .gal-slide img { max-height:56vh; }
}

@media (prefers-reduced-motion:reduce) {
  *, *::before, *::after { animation-duration:.01ms !important; transition-duration:.01ms !important; }
}
  </style>
</head>
<body>

  <div class="page">
    <header class="hero-text" id="heroText">
      <h1 class="title">
        <span class="t1">Ahora sí puedo decir</span>
        <span class="t2" id="t2hero">que es viral</span>
      </h1>
      <div class="event-meta" id="eventMeta">
        <p class="meta-line">Viernes, 24 de julio · 21PM</p>
        <p class="meta-line meta-place">Av. Juan Bautista Alberdi 2476 SUM</p>
      </div>
    </header>

    <div class="folder-wrap" id="folderWrap">
      <div class="folder-scene">
        <div class="photo-stack" id="photoStack">
          <div class="photo-card" data-idx="0"><img src="assets/foto%20gi%204.png" alt="Gi" draggable="false"></div>
          <div class="photo-card" data-idx="1"><img src="assets/foto%20gi.png"     alt="Gi" draggable="false"></div>
          <div class="photo-card" data-idx="2"><img src="assets/foto%20gi%202.png" alt="Gi" draggable="false"></div>
          <div class="photo-card" data-idx="3"><img src="assets/foto%20gi%203.png" alt="Gi" draggable="false"></div>
        </div>

        <div class="folder-back" id="folderBack">
          <div class="folder-tab"></div>
          <div class="folder-body"></div>
        </div>

        <div class="folder-front" id="folderFront">
          <div class="folder-front-inner">
            <div class="folder-shine"></div>
            <div class="folder-pill"><span>La Recibida.gallery</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Desktop hint -->
  <div class="drag-hint" id="dragHint">arrastrá una foto hacia abajo para cerrar</div>

  <!-- Mobile gallery overlay — built by JS -->
  <div class="gal" id="mobileGal" role="dialog" aria-modal="true" aria-label="Galería de fotos">
    <button class="gal-close" id="galClose" aria-label="Cerrar galería">×</button>
    <div class="gal-viewport">
      <div class="gal-track" id="galTrack"></div>
    </div>
    <div class="gal-dots" id="galDots"></div>
    <p class="gal-hint">deslizá para navegar · abajo para cerrar</p>
  </div>

  <script>
document.addEventListener('DOMContentLoaded', () => {

  /* ─── Entrance ─── */
  const t1   = document.querySelector('.t1');
  const t2   = document.getElementById('t2hero');
  const meta = document.getElementById('eventMeta');
  const fw   = document.getElementById('folderWrap');
  if (t1)   setTimeout(() => t1.classList.add('visible'),   150);
  if (t2)   setTimeout(() => t2.classList.add('visible'),   340);
  if (meta) setTimeout(() => meta.classList.add('visible'), 620);
  if (fw)   setTimeout(() => fw.classList.add('drop-in'),   820);

  /* Mobile: start idle float + glow after entrance (820ms delay + ~950ms animation) */
  setTimeout(() => {
    if (!isMobile()) return;
    fw.classList.add('idle');
    folderFront.classList.add('glow');
    /* Peek once: cards fan slightly above the flap, then close back */
    setTimeout(doPeek, 700);
  }, 1900);

  /* ─── Elements ─── */
  const folderBack  = document.getElementById('folderBack');
  const folderFront = document.getElementById('folderFront');
  const dragHint    = document.getElementById('dragHint');
  const cards       = Array.from(document.querySelectorAll('.photo-card'));
  const N           = cards.length;

  const gal      = document.getElementById('mobileGal');
  const galTrack = document.getElementById('galTrack');
  const galDots  = document.getElementById('galDots');
  const galClose = document.getElementById('galClose');

  /* ─── Helpers ─── */
  const canHover  = window.matchMedia('(hover:hover) and (pointer:fine)').matches;
  const isMobile  = () => window.innerWidth < 600;

  /* ─── Build gallery slides ─── */
  cards.forEach(card => {
    const img = card.querySelector('img');

    const slide = document.createElement('div');
    slide.className = 'gal-slide';

    const i = document.createElement('img');
    i.src = img.src; i.alt = img.alt; i.draggable = false;
    slide.appendChild(i);
    galTrack.appendChild(slide);

    const dot = document.createElement('span');
    dot.className = 'gal-dot';
    galDots.appendChild(dot);
  });

  const dotEls = Array.from(galDots.querySelectorAll('.gal-dot'));
  let galIdx   = 0;

  function setGalDots(idx) {
    dotEls.forEach((d, i) => d.classList.toggle('active', i === idx));
  }

  function galGoTo(idx, animated = true) {
    galIdx = Math.max(0, Math.min(N - 1, idx));
    galTrack.style.transition = animated
      ? 'transform .36s cubic-bezier(.25,.8,.25,1)'
      : 'none';
    galTrack.style.transform  = `translateX(-${galIdx * 100}%)`;
    setGalDots(galIdx);
  }

  /* ─── Peek animation (mobile only, fires once after entrance) ─── */
  function doPeek() {
    if (!isMobile()) return;
    cards.forEach((c, i) => {
      const o  = i - Math.floor(N / 2);
      const tx = o * 20;
      const ty = o * -5 - 26;
      const r  = o * 6;
      const sc = 1 - Math.abs(o) * 0.02;
      c.style.transition = `transform .55s cubic-bezier(.34,1.56,.64,1) ${i * 55}ms`;
      c.style.transform  = `translateX(${tx}px) translateY(${ty}px) rotate(${r}deg) scale(${sc})`;
    });
    setTimeout(() => {
      cards.forEach((c, i) => {
        c.style.transition = `transform .5s cubic-bezier(.34,1.56,.64,1) ${i * 40}ms`;
      });
      applyStacked(false);
    }, 1400);
  }

  /* ─── Gallery open / close ─── */
  function openGallery() {
    galIdx = 0;
    galTrack.style.transition = 'none';
    galTrack.style.transform  = 'translateX(0)';
    setGalDots(0);
    gal.style.transform = '';
    gal.style.opacity   = '';
    gal.classList.add('open');
    /* pause idle while gallery is open */
    fw.classList.remove('idle');
    folderFront.classList.remove('glow');
  }

  function closeGallery(fast = false) {
    const dur = fast ? 220 : 300;
    gal.style.transition = `opacity ${dur}ms ease, transform ${dur}ms ease`;
    gal.style.opacity    = '0';
    gal.style.transform  = 'translateY(24px)';
    setTimeout(() => {
      gal.classList.remove('open');
      gal.style.transition = '';
      gal.style.transform  = '';
      gal.style.opacity    = '';
      /* resume idle after gallery closes */
      if (isMobile()) {
        fw.classList.add('idle');
        folderFront.classList.add('glow');
      }
    }, dur);
  }

  galClose.addEventListener('click', () => closeGallery());

  /* ─── Gallery swipe (mobile) ─── */
  let gt = { startX:0, startY:0, dir:null, active:false };

  gal.addEventListener('touchstart', e => {
    gt.startX = e.touches[0].clientX;
    gt.startY = e.touches[0].clientY;
    gt.dir    = null;
    gt.active = true;
    galTrack.style.transition = 'none';
  }, { passive: true });

  gal.addEventListener('touchmove', e => {
    if (!gt.active) return;
    const dx = e.touches[0].clientX - gt.startX;
    const dy = e.touches[0].clientY - gt.startY;

    if (!gt.dir && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
      gt.dir = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    }

    e.preventDefault();

    if (gt.dir === 'h') {
      galTrack.style.transform = `translateX(calc(-${galIdx * 100}% + ${dx}px))`;
    } else if (gt.dir === 'v' && dy > 0) {
      /* follow finger down */
      const progress = Math.min(dy / 240, 1);
      gal.style.transform = `translateY(${dy * 0.6}px)`;
      gal.style.opacity   = `${1 - progress * 0.6}`;
    }
  }, { passive: false });

  gal.addEventListener('touchend', e => {
    if (!gt.active) return;
    gt.active = false;
    const dx = e.changedTouches[0].clientX - gt.startX;
    const dy = e.changedTouches[0].clientY - gt.startY;

    if (gt.dir === 'h') {
      if      (dx < -52 && galIdx < N - 1) galGoTo(galIdx + 1);
      else if (dx >  52 && galIdx > 0)     galGoTo(galIdx - 1);
      else                                  galGoTo(galIdx);   /* snap */
    } else if (gt.dir === 'v' && dy > 0) {
      if (dy > 88) {
        closeGallery();
      } else {
        /* snap back */
        gal.style.transition = 'transform .3s ease, opacity .3s ease';
        gal.style.transform  = '';
        gal.style.opacity    = '';
        setTimeout(() => { gal.style.transition = ''; }, 300);
      }
    } else {
      /* tiny move, snap track */
      galGoTo(galIdx);
    }
  }, { passive: true });

  /* ═══════════════════════════════════════════════
     DESKTOP — fan gallery
  ═══════════════════════════════════════════════ */
  let isOpen = false;

  const FAN = [
    { rot:-8, dy:-6 }, { rot:-2, dy:8 },
    { rot: 4, dy:-4 }, { rot: 9, dy:5 },
  ];

  function centreOffset(idx) { return idx - (N - 1) / 2; }

  function getSpread() {
    const cardW = 188;
    return Math.max(cardW * 0.75, Math.min(cardW * 0.90, window.innerWidth * 0.13));
  }

  function stackedTransform(idx, hovered) {
    const o  = idx - Math.floor(N / 2);
    const tx = hovered ? o*26 : o*3;
    const ty = hovered ? o*-8-36 : o*-5;
    const r  = hovered ? o*7  : o*3;
    const sc = 1 - Math.abs(o) * 0.03;
    return `translateX(${tx}px) translateY(${ty}px) rotate(${r}deg) scale(${sc})`;
  }

  function fanTransform(idx) {
    const { rot, dy } = FAN[idx % FAN.length];
    return `translateX(${(centreOffset(idx) * getSpread()).toFixed(1)}px) translateY(${-10+dy}px) rotate(${rot}deg) scale(1)`;
  }

  function applyStacked(hovered = false) {
    cards.forEach((c, i) => {
      c.style.transition = 'transform .5s cubic-bezier(.34,1.56,.64,1)';
      c.style.transform  = stackedTransform(i, hovered);
      c.style.zIndex     = i + 10;
    });
  }
  applyStacked();

  function openDesktop() {
    isOpen = true;
    folderFront.classList.add('is-open');
    folderBack.classList.add('hidden');
    cards.forEach((c, i) => {
      c.style.transition = `transform .55s cubic-bezier(.34,1.56,.64,1) ${i*65}ms`;
      c.style.transform  = fanTransform(i);
      c.style.zIndex     = 30 + i;
      c.classList.add('open-state');
    });
    dragHint.classList.add('visible');
  }

  function closeDesktop() {
    isOpen = false;
    cards.forEach(c => {
      c.style.transition = 'transform .5s cubic-bezier(.34,1.56,.64,1)';
      c.classList.remove('open-state');
    });
    applyStacked(false);
    dragHint.classList.remove('visible');
    setTimeout(() => {
      if (!isOpen) {
        folderFront.classList.remove('is-open');
        folderBack.classList.remove('hidden');
      }
    }, 300);
  }

  /* Hover (desktop mouse only) */
  if (canHover) {
    folderFront.addEventListener('mouseenter', () => {
      if (isOpen) return;
      folderFront.classList.add('hovered');
      applyStacked(true);
    });
    folderFront.addEventListener('mouseleave', () => {
      if (isOpen) return;
      folderFront.classList.remove('hovered');
      applyStacked(false);
    });
  }

  /* Folder click — route by device */
  folderFront.addEventListener('click', () => {
    if (isMobile()) {
      openGallery();
    } else {
      if (!isOpen) openDesktop();
    }
  });

  /* Desktop drag-to-close */
  const drag = { active:false, card:null, idx:0, fan:null, startY:0 };

  cards.forEach(c => {
    c.addEventListener('mousedown', e => {
      if (!isOpen || isMobile()) return;
      drag.active = true;
      drag.card   = c;
      drag.idx    = parseInt(c.dataset.idx, 10);
      drag.fan    = FAN[drag.idx % FAN.length];
      drag.startY = e.clientY;
      c.classList.add('dragging');
      c.style.zIndex = 150;
      e.preventDefault();
    }, { passive:false });
  });

  window.addEventListener('mousemove', e => {
    if (!drag.active) return;
    const dy  = e.clientY - drag.startY;
    const tx  = centreOffset(drag.idx) * getSpread();
    const rot = drag.fan.rot + (dy > 0 ? Math.min(dy * .05, 12) : 0);
    drag.card.style.transform =
      `translateX(${tx.toFixed(1)}px) translateY(${-10+drag.fan.dy+dy}px) rotate(${rot}deg) scale(1.07)`;
  });

  window.addEventListener('mouseup', e => {
    if (!drag.active) return;
    const dy = e.clientY - drag.startY;
    drag.card.classList.remove('dragging');
    drag.card.style.zIndex = 30 + drag.idx;
    if (dy > 90) closeDesktop();
    else {
      drag.card.style.transition = 'transform .5s cubic-bezier(.34,1.56,.64,1)';
      drag.card.style.transform  = fanTransform(drag.idx);
    }
    drag.active = false; drag.card = null;
  });

  window.addEventListener('resize', () => {
    if (isOpen && !isMobile()) {
      cards.forEach((c, i) => {
        c.style.transition = `transform .5s cubic-bezier(.34,1.56,.64,1) ${i*65}ms`;
        c.style.transform  = fanTransform(i);
      });
    }
  });

});
  </script>
</body>
</html>
